<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Accueil</title>
</head>
<body class="container mt-4">

    {% include 'navbar.html' %}
    <h2>Modifier la note</h2>

    <form method="POST">
        <label>Matière: </label>
        <input type="text" name="subject" value="{{ note.subject }}" required><br><br>
        <label>Nouvelle note: </label>
        <input type="number" step="0.25" name="score" value="{{ note.score }}" required><br><br>
        <button type="submit" class="btn btn-primary m-2">Modifier</button>
    </form>
    
</body>
</html>
