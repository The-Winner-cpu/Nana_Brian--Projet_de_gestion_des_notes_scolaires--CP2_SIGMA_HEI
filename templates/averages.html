<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Moyennes</title>
</head>
<body class="container mt-4">

    {% include 'navbar.html' %}
    <h2 class="mb-4">Moyenne par étudiant</h2>

    <table class="table table-striped table-bordered">
        <tr>
            <th>Étudiant</th>
            <th>Moyenne</th>
        </tr>
        {% for student in results %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.average }}</td>
        </tr>
        {% endfor %}
    </table>
    <div class="mt-4">
        <h3>Moyenne générale de la classe : {{ general_avg }}</h3>
    </div>
    <a href="/ranking" class="btn btn-primary m-2"> Consulter le classement </a>

</body>
</html>
