<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Inscription</title>
</head>
<body class="container mt-4">

    {% include 'navbar.html' %}
    <h1>Créer un compte</h1>
    <form method="POST">
        <label>Nom & Prénom: </label>
        <input type="text" name="username" placeholder="Nom" required><br><br>
        <label>Email: </label>
        <input type="email" name="email" placeholder="Email" required><br><br>
        <label>Créer votre mot de passe: </label>
        <input type="password" name="password" placeholder="Mot de passe" required><br><br>
        <button type="submit" class="btn btn-primary m-2">Inscris-toi champion</button>
    </form>
    <br>
    <p>Avez vous déjà un compte ?</p>
    <a href="/login" class="btn btn-success m-2"> Connectez-vous boss </a>

</body>
</html>
