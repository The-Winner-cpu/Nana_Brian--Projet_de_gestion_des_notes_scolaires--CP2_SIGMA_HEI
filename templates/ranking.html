<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Classement</title>
</head>
<body class="container mt-4">

    {% include 'navbar.html' %}
    <h2>Classement des étudiants</h2>
    <p>Being The Winner today, means preparing to win again tomorrow.</p>
    <p>Stay focused !</p>

    <table class="table table-striped table-bordered">
        <tr>
            <th>Rang</th>
            <th>Étudiant</th>
            <th>Moyenne</th>
        </tr>
        {% for student in results %}
        <tr>
            <td>{{ student.rank }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.average }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/chart" class="btn btn-primary m-2"> Consulter les performances </a>

</body>
</html>
